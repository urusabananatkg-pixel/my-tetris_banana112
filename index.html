<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Infinity</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="sidebar">
            <div class="box">HOLD<canvas id="holdCanvas" width="60" height="60"></canvas></div>
            <div class="box">SCORE<div id="scoreDisplay">0</div>LEVEL: <span id="levelDisplay">1</span></div>
            <div class="box ranking-box">
                TOP 5
                <div id="rankingList"></div>
            </div>
        </div>
        <div class="main-screen">
            <canvas id="tetrisCanvas" width="300" height="600"></canvas>
            <div id="msg"></div>
        </div>
        <div class="sidebar">
            <div class="box">NEXT<canvas id="nextCanvas" width="60" height="320"></canvas></div>
            <div id="rule-section">
                <h3>🎮 操作</h3>
                <p>W: 即設置<br>A/D: 移動<br>S: 加速<br>K/L: 回転<br>I/J: ホールド</p>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
