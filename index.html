<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tetris Ultimate Edition</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div id="game-container">
        <div class="sidebar left">
            <div class="box"><div>HOLD</div><canvas id="holdCanvas" width="60" height="60"></canvas></div>
            <div class="box">
                <div>SCORE</div><div id="scoreDisplay">0</div>
                <div class="small">LEVEL: <span id="levelDisplay">1</span></div>
            </div>
            <div class="box ranking">
                <div class="title">TOP 5</div>
                <div id="rankingList"></div>
            </div>
        </div>
        <div class="main-screen">
            <canvas id="tetrisCanvas" width="300" height="600"></canvas>
            <div id="msg"></div>
        </div>
        <div class="sidebar right">
            <div class="box"><div>NEXT</div><canvas id="nextCanvas" width="60" height="320"></canvas></div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
